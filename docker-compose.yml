version: '3'
services:

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: alunos_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_NAME: alunos_db
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      - db

volumes:
  pgdata: